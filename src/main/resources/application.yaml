server:
  port: 8888
  servlet:
    context-path: /api/v1

spring:
  application:
    name: muasamcong

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    org.hibernate.orm.jdbc.warn: error

gateway:
  url: ${GATEWAY_URL:http://127.0.0.1:18080}
  key: ${GATEWAY_KEY:secret}
  download-timeout-seconds: ${GATEWAY_DOWNLOAD_TIMEOUT_SECONDS:600}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://192.168.*.*:3000,http://172.*.*.*:3000,https://leonore-cyclonal-preindependently.ngrok-free.dev}

sync:
  bid-package:
    enabled: ${BID_PACKAGE_SYNC_ENABLED:true}
    fixed-delay-ms: ${BID_PACKAGE_SYNC_FIXED_DELAY_MS:1800000}
    document-download-limit: ${BID_PACKAGE_SYNC_DOCUMENT_DOWNLOAD_LIMIT:50}

smb:
  port: ${SMB_PORT:445}
  domain: ${SMB_DOMAIN:}
